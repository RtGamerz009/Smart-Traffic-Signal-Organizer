kind = "web"
previewPath = "/"
title = "Smart Traffic Signal Optimizer"
version = "1.0.0"
id = "artifacts/traffic-optimizer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18596

[services.development]
run = "pnpm --filter @workspace/traffic-optimizer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/traffic-optimizer", "run", "build" ]
publicDir = "artifacts/traffic-optimizer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18596"
BASE_PATH = "/"
